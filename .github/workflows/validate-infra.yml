name: Validate Infrastructure

on:
  pull_request:
    paths:
      - 'infra/**'
  push:
    branches:
      - main
    paths:
      - 'infra/**'

jobs:
  validate-bicep:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Validate Bicep compilation
        run: |
          az bicep build-params --file infra/main.bicepparam
      
      - name: Lint Bicep
        run: |
          az bicep lint --file infra/main.bicep
